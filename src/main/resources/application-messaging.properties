# Profile for async integration with ActiveMQ + IAM publisher.
# Run Relatives with: --spring.profiles.active=messaging,prod

app.messaging.enabled=true

spring.activemq.broker-url=${ACTIVEMQ_BROKER_URL:tcp://localhost:61616}
spring.activemq.user=${ACTIVEMQ_USER:meditrack}
spring.activemq.password=${ACTIVEMQ_PASSWORD:meditrack}
